# ── Redireciona HTTP → HTTPS ──────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── HTTPS ─────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name _;

    # Certificados TLS — substituir por certs reais em producao
    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Headers de seguranca ──────────────────────────────────
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options     "nosniff" always;
    add_header X-Frame-Options            "DENY" always;
    add_header Referrer-Policy            "no-referrer" always;
    add_header Permissions-Policy         "geolocation=(self), camera=(), microphone=()" always;
    # X-XSS-Protection removido: header obsoleto, ignorado pelos
    # navegadores modernos e potencialmente nocivo em versoes antigas.
    add_header Content-Security-Policy    "default-src 'self'; connect-src 'self'; img-src 'self' data:; script-src 'self';" always;

    # ── Oculta versao do Nginx ────────────────────────────────
    server_tokens off;

    # ── Proxy para o backend NestJS ───────────────────────────
    location /api/ {
        proxy_pass         http://api:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # ── Health check publico ──────────────────────────────────
    location /health {
        proxy_pass http://api:3000/health;
    }
}