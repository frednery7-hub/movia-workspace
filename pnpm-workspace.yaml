packages:
  - 'apps/*'
  - 'packages/*'

# ── Overrides de dependências transitivas ───────────────────────
# Migrado de package.json['pnpm']['overrides'] para pnpm 11+
# Ver docs/security/accepted-risk.md para justificativas.
overrides:
  "tar": ">=7.5.11"
  "uuid": ">=9.0.0"
  "@xmldom/xmldom": ">=0.8.10"
  "postcss": ">=8.5.10"
  "shell-quote": ">=1.8.4"
  "esbuild": "0.28.1"
  "@hono/node-server": "1.19.13"
  "form-data": "^4.0.6"
  "@opentelemetry/core": "^2.8.0"
  "multer": "^2.2.0"
  "ws@>=8.0.0 <8.21.0": "8.21.0"
  "ws@>=7.0.0 <7.5.11": "7.5.11"
  "ws@>=6.0.0 <6.2.4": "6.2.4"
  "vite@<=6.4.2": "6.4.3"
  "piscina@<=4.9.2": "4.9.3"
  "protobufjs@>=8.0.0 <=8.5.0": "8.6.0"
  "protobufjs-cli@>=2.0.0 <=2.5.0": "2.5.1"
  "tar@<=7.5.15": "7.5.16"
  "js-yaml@<=4.1.1": "4.2.0"
  "@babel/core@<=7.29.0": "7.29.6"
  "react-router@>=7.12.0 <7.15.1": "7.15.1"
  "undici@<6.27.0": "6.27.0"
  "@expo/cli>undici": "6.27.0"
  "@expo/cli>tar": "^6.2.1"
  "@xhmikosr/decompress": ">=11.1.3"

# ── Auditoria de segurança ──────────────────────────────────────
# CVEs aceitas deliberadamente (tooling-only, nunca chegam à produção)
# pnpm 11 usa ignoreGhsas em vez de ignoreCves
# Ver docs/security/accepted-risk.md para detalhes e revisão
auditConfig:
  ignoreGhsas:
    - "GHSA-34x7-hfp2-rc4v"
    - "GHSA-8qq5-rm4j-mr97"
    - "GHSA-83g3-92jg-28cx"
    - "GHSA-qffp-2rhf-9h96"
    - "GHSA-9ppj-qmqm-q256"
    - "GHSA-r6q2-hw4h-h46w"
    - "GHSA-vmf3-w455-68vh"

allowBuilds:
  '@nestjs/core': true
  '@playwright/browser-chromium': true
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': true
  '@swc/core': true
  '@tailwindcss/oxide': true
  esbuild: true
  prisma: true
