name: Build Android APK

# Gera um APK de release assinado com a keystore de produção.
#
# Dispara em tags v* (release oficial) ou manualmente (build de teste
# sob demanda). Não roda em todo push: o build leva vários minutos e
# consome minutos de CI sem necessidade.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore keystore from secret
        run: |
          mkdir -p "$RUNNER_TEMP/keystore"
          echo "${{ secrets.MOVIA_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/keystore/movia-production.jks"
          # Confere que o arquivo decodificou para uma keystore válida
          keytool -list -keystore "$RUNNER_TEMP/keystore/movia-production.jks" \
            -storepass "${{ secrets.MOVIA_KEYSTORE_PASSWORD }}" > /dev/null
          echo "Keystore restaurada e validada."

      - name: Prebuild Android
        working-directory: apps/mobile
        env:
          EXPO_PUBLIC_GOOGLE_MAPS_ANDROID_API_KEY: ${{ secrets.EXPO_PUBLIC_GOOGLE_MAPS_ANDROID_API_KEY }}
        run: npx expo prebuild --platform android --clean

      - name: Build signed release APK
        working-directory: apps/mobile/android
        env:
          EXPO_PUBLIC_GOOGLE_MAPS_ANDROID_API_KEY: ${{ secrets.EXPO_PUBLIC_GOOGLE_MAPS_ANDROID_API_KEY }}
          MOVIA_UPLOAD_STORE_FILE: ${{ runner.temp }}/keystore/movia-production.jks
          MOVIA_UPLOAD_STORE_PASSWORD: ${{ secrets.MOVIA_KEYSTORE_PASSWORD }}
          MOVIA_UPLOAD_KEY_ALIAS: ${{ secrets.MOVIA_KEY_ALIAS }}
          MOVIA_UPLOAD_KEY_PASSWORD: ${{ secrets.MOVIA_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Verify signature and compute SHA-256
        id: verify
        working-directory: apps/mobile/android
        run: |
          APK="app/build/outputs/apk/release/app-release.apk"
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner | sort -V | tail -1)

          echo "--- Assinatura ---"
          "$APKSIGNER" verify --print-certs "$APK"

          # Falha o build se o APK não estiver assinado com a keystore de produção
          FINGERPRINT=$("$APKSIGNER" verify --print-certs "$APK" | grep -i "SHA-256 digest" | head -1 | awk '{print $NF}')
          EXPECTED="877ac2ae24543be3710973842f1bedb9da9a462d369f5a6097bec1c169cf7764"
          if [ "$FINGERPRINT" != "$EXPECTED" ]; then
            echo "ERRO: APK assinado com certificado inesperado."
            echo "  esperado: $EXPECTED"
            echo "  obtido:   $FINGERPRINT"
            exit 1
          fi
          echo "Assinatura confere com a keystore de produção."

          SHA256=$(sha256sum "$APK" | awk '{print $1}')
          echo "apk_sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "APK SHA-256: $SHA256"

      - name: Rename APK with version
        id: rename
        working-directory: apps/mobile/android
        run: |
          VERSION=$(node -p "require('../app.json').expo.version")
          CODE=$(node -p "require('../app.json').expo.android.versionCode")
          NAME="Movia-v${VERSION}-${CODE}.apk"
          cp app/build/outputs/apk/release/app-release.apk "$RUNNER_TEMP/$NAME"
          echo "apk_name=$NAME" >> "$GITHUB_OUTPUT"
          echo "apk_path=$RUNNER_TEMP/$NAME" >> "$GITHUB_OUTPUT"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rename.outputs.apk_name }}
          path: ${{ steps.rename.outputs.apk_path }}
          retention-days: 30

      - name: Attach APK to the release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "${{ steps.rename.outputs.apk_path }}" --clobber
