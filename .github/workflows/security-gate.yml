name: Security Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root
          POSTGRES_DB: movia_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:root@localhost:5432/movia_db?schema=public
      JWT_SECRET: ci_secret_minimo_32_caracteres_aqui
      NODE_ENV: test
      ALLOWED_ORIGINS: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Step 1: Secret Scanning ───────────────────────────────
      - name: Secret Scanning (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Step 2: Dependency Audit ──────────────────────────────
      - name: Dependency Audit
        run: pnpm audit --audit-level=high

      # ── Step 3: Whitespace / Diff Hygiene ─────────────────────
      - name: Git Diff Check
        run: git diff --check

      # ── Step 4: Lint ──────────────────────────────────────────
      - name: Lint Backend
        run: pnpm --filter backend exec eslint src --ext .ts

      - name: Lint Mobile
        run: pnpm --filter mobile lint

      # ── Step 5: Typecheck ─────────────────────────────────────
      - name: Typecheck Backend
        run: pnpm --filter backend exec tsc --noEmit

      - name: Typecheck Mobile
        run: pnpm --filter mobile exec tsc --noEmit

      # ── Step 6: Unit Tests ────────────────────────────────────
      - name: Unit Tests Backend
        run: pnpm --filter backend exec jest --watchman=false --no-coverage

      - name: Unit Tests Mobile
        run: pnpm --filter mobile exec jest --watchman=false --no-coverage

      # ── Step 7: Build ─────────────────────────────────────────
      - name: Build Backend
        run: pnpm --filter backend build

      # ── Step 8: Prisma Migrate ────────────────────────────────
      - name: Prisma Migrate
        run: pnpm --filter backend exec prisma migrate deploy

      # ── Step 9: Seed ──────────────────────────────────────────
      - name: Seed Database
        run: pnpm --filter backend exec prisma db seed

      # ── Step 10: Security Smoke Tests ────────────────────────
      - name: Security Smoke Tests
        run: pnpm --filter backend test:e2e

      # ── Step 11: Docker Build Check ───────────────────────────
      - name: Docker Build Check
        run: docker build -f apps/backend/Dockerfile -t movia-backend:ci .

      # ── Step 12: Docker Image Size ────────────────────────────
      # A imagem multi-stage ficou em ~1.6GB. O limite existe para pegar
      # regressao grave (ex.: alguem voltar ao build single-stage, que
      # produzia 3.9GB), nao para policiar variacoes pequenas.
      - name: Docker Image Size Check
        run: |
          LIMIT_MB=2200
          SIZE_BYTES=$(docker image inspect movia-backend:ci --format='{{.Size}}')
          SIZE_MB=$((SIZE_BYTES / 1024 / 1024))

          echo "Tamanho da imagem: ${SIZE_MB} MB (limite: ${LIMIT_MB} MB)"

          if [ "$SIZE_MB" -gt "$LIMIT_MB" ]; then
            echo "ERRO: a imagem passou do limite."
            echo "Provavel causa: devDependencies ou fontes vazando para o estagio de runtime."
            exit 1
          fi
          echo "Tamanho dentro do limite."

      # ── Step 13: Required Secrets ─────────────────────────────
      # Falha cedo, com mensagem clara, se um secret necessario sumir --
      # em vez de quebrar la na frente com um erro obscuro de deploy ou
      # de assinatura de APK.
      - name: Required Secrets Check
        env:
          # WIF usa `vars`, nao `secrets`: provider e service account sao
          # identificadores publicos. A seguranca vem da federacao OIDC
          # restrita a este repositorio, nao do sigilo dos nomes.
          GCP_WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
          GCP_DEPLOYER_SA: ${{ vars.GCP_DEPLOYER_SA }}
          MOVIA_KEYSTORE_BASE64: ${{ secrets.MOVIA_KEYSTORE_BASE64 }}
          MOVIA_KEYSTORE_PASSWORD: ${{ secrets.MOVIA_KEYSTORE_PASSWORD }}
          MOVIA_KEY_ALIAS: ${{ secrets.MOVIA_KEY_ALIAS }}
          MOVIA_KEY_PASSWORD: ${{ secrets.MOVIA_KEY_PASSWORD }}
          EXPO_PUBLIC_GOOGLE_MAPS_ANDROID_API_KEY: ${{ secrets.EXPO_PUBLIC_GOOGLE_MAPS_ANDROID_API_KEY }}
        run: |
          MISSING=""
          for NAME in GCP_WIF_PROVIDER GCP_DEPLOYER_SA \
                      MOVIA_KEYSTORE_BASE64 MOVIA_KEYSTORE_PASSWORD \
                      MOVIA_KEY_ALIAS MOVIA_KEY_PASSWORD \
                      EXPO_PUBLIC_GOOGLE_MAPS_ANDROID_API_KEY; do
            if [ -z "${!NAME}" ]; then
              MISSING="$MISSING $NAME"
            fi
          done

          if [ -n "$MISSING" ]; then
            echo "ERRO: secrets/vars ausentes:$MISSING"
            echo "Configure em Settings > Secrets and variables > Actions"
            echo "(GCP_* sao Variables; MOVIA_* e EXPO_* sao Secrets)."
            exit 1
          fi
          echo "Todos os secrets necessarios estao presentes."

