name: Security Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root
          POSTGRES_DB: movia_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:root@localhost:5432/movia_db?schema=public
      JWT_SECRET: ci_secret_minimo_32_caracteres_aqui
      NODE_ENV: test
      ALLOWED_ORIGINS: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Step 1: Secret Scanning ───────────────────────────────
      - name: Secret Scanning (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Step 2: Dependency Audit ──────────────────────────────
      - name: Dependency Audit
        run: pnpm audit --audit-level=high

      # ── Step 3: Whitespace / Diff Hygiene ─────────────────────
      - name: Git Diff Check
        run: git diff --check

      # ── Step 4: Lint ──────────────────────────────────────────
      - name: Lint Backend
        run: pnpm --filter backend exec eslint src --ext .ts

      - name: Lint Mobile
        run: pnpm --filter mobile lint

      # ── Step 5: Typecheck ─────────────────────────────────────
      - name: Typecheck Backend
        run: pnpm --filter backend exec tsc --noEmit

      - name: Typecheck Mobile
        run: pnpm --filter mobile exec tsc --noEmit

      # ── Step 6: Unit Tests ────────────────────────────────────
      - name: Unit Tests Backend
        run: pnpm --filter backend exec jest --watchman=false --no-coverage

      - name: Unit Tests Mobile
        run: pnpm --filter mobile exec jest --watchman=false --no-coverage

      # ── Step 7: Build ─────────────────────────────────────────
      - name: Build Backend
        run: pnpm --filter backend build

      # ── Step 8: Prisma Migrate ────────────────────────────────
      - name: Prisma Migrate
        run: pnpm --filter backend exec prisma migrate deploy

      # ── Step 9: Seed ──────────────────────────────────────────
      - name: Seed Database
        run: pnpm --filter backend exec prisma db seed

      # ── Step 10: Security Smoke Tests ────────────────────────
      - name: Security Smoke Tests
        run: pnpm --filter backend test:e2e

      # ── Step 11: Docker Build Check ───────────────────────────
      - name: Docker Build Check
        run: docker build -f apps/backend/Dockerfile -t movia-backend:ci .
