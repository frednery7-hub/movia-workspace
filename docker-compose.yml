services:
  db:
    image: postgres:15.7-alpine
    container_name: movia_db
    restart: unless-stopped
    user: postgres
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    expose:
      - "5432"
    volumes:
      - movia_pg_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout:  5s
      retries:  5
    deploy:
      resources:
        limits:
          memory: 512m
          cpus:   "0.5"

  redis:
    image: redis:7.2-alpine
    container_name: movia_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD:-movia_redis_secret}
    expose:
      - "6379"
    volumes:
      - movia_redis_data:/data
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5
    deploy:
      resources:
        limits:
          memory: 128m
          cpus:   "0.25"

volumes:
  movia_pg_data:
  movia_redis_data: