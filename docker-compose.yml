services:
  db:
    image: postgres:15-alpine
    container_name: movia_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    expose:
      - "5432"

  redis:
    image: redis:7-alpine
    container_name: movia_redis
    expose:
      - "6379"